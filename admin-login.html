<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="admin-container">
      <div class="left-side">
        <img src="assets/login.png" alt="Login" />
      </div>
      <div class="right-side">
        <h2>Admin Login</h2>
        <form action="dashboard.html">
          <label for="admin-email">User Name</label>
          <input type="text" id="admin-email" name="admin-email" required />

          <label for="admin-password">Password</label>
          <input
            type="password"
            id="admin-password"
            name="admin-password"
            required
          />
          <h3><a href="#" class="admin-forgetPassword">Forget Password</a></h3>
          <!-- <h3 class="admin-forgetPassword">.</h3> -->
          <button type="submit" class="admin-login-btn">Login</button>
        </form>
      </div>
    </div>
  </body>
</html>
