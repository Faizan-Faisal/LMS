<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Management - LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="management-section">
        <div class="section-header">
            <h2>Course Management</h2>
            <div class="header-actions">
                <button class="btn-primary" onclick="showCourseForm()">
                    <i class="fas fa-plus"></i> Add New Course
                </button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="courseSearch" placeholder="Search courses...">
                </div>
                <button class="btn-secondary" onclick="refreshCourseTable()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Course Table -->
        <div class="table-container">
            <table id="courseTable">
                <thead>
                    <tr>
                        <th>Thumbnail</th>
                        <th>Code</th>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Section</th>
                        <th>Instructor</th>
                        <th>Capacity</th>
                        <th>Schedule</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Course data will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Course Registration Form Modal -->
        <div id="courseFormContainer" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Register New Course</h3>
                    <span class="close" onclick="closeCourseForm()">&times;</span>
                </div>
                <form id="courseForm" enctype="multipart/form-data">
                    <div class="form-section">
                        <div class="profile-upload">
                            <div class="profile-preview">
                                <img id="courseThumbnailPreview" src="images/default-course.png" alt="Course Thumbnail Preview">
                            </div>
                            <div class="upload-controls">
                                <label for="courseThumbnail" class="upload-btn">
                                    <i class="fas fa-image"></i> Upload Thumbnail
                                </label>
                                <input type="file" id="courseThumbnail" name="course_thumbnail" accept="image/*" onchange="previewImage(this, 'courseThumbnailPreview')" hidden>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Course Information</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="course_code">Course Code</label>
                                <input type="text" id="course_code" name="course_code" placeholder="CS101" pattern="[A-Z]{2,3}\d{3}" required>
                                <small>Format: 2-3 letters followed by 3 digits</small>
                            </div>
                            <div class="form-group">
                                <label for="course_name">Course Name</label>
                                <input type="text" id="course_name" name="course_name" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="course_class">Class</label>
                                <select id="course_class" name="course_class" required onchange="updateCourseSectionOptions()">
                                    <option value="">Select Class</option>
                                    <option value="9">9th Class</option>
                                    <option value="10">10th Class</option>
                                    <option value="11">11th Class</option>
                                    <option value="12">12th Class</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="course_section">Section</label>
                                <select id="course_section" name="course_section" required>
                                    <option value="">Select Class First</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Course Details</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="course_instructor">Instructor</label>
                                <select id="course_instructor" name="course_instructor" required>
                                    <option value="">Select Instructor</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="course_capacity">Capacity</label>
                                <input type="number" id="course_capacity" name="course_capacity" min="1" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="course_schedule">Schedule</label>
                                <input type="text" id="course_schedule" name="course_schedule" placeholder="Mon, Wed 10:00 AM - 11:30 AM" required>
                            </div>
                            <div class="form-group">
                                <label for="course_room">Room</label>
                                <input type="text" id="course_room" name="course_room" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="course_description">Description</label>
                                <textarea id="course_description" name="course_description" rows="3" required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Register Course
                        </button>
                        <button type="reset" class="btn-secondary">
                            <i class="fas fa-undo"></i> Reset Form
                        </button>
                        <button type="button" class="btn-secondary" onclick="closeCourseForm()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/admin-dashboard.js"></script>
</body>
</html>
