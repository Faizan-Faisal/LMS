<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Management - LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="management-section">
        <div class="section-header">
            <h2>Instructor Management</h2>
            <div class="header-actions">
                <button class="btn-primary" onclick="showInstructorForm()">
                    <i class="fas fa-plus"></i> Add New Instructor
                </button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="instructorSearch" placeholder="Search instructors...">
                </div>
                <button class="btn-secondary" onclick="refreshInstructorTable()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Instructor Table -->
        <div class="table-container">
            <table id="instructorTable">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Qualification</th>
                        <th>Specialization</th>
                        <th>Experience</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Instructor data will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Instructor Registration Form Modal -->
        <div id="instructorFormContainer" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Register New Instructor</h3>
                    <span class="close" onclick="closeInstructorForm()">&times;</span>
                </div>
                <form id="instructorForm" enctype="multipart/form-data">
                    <div class="form-section">
                        <div class="profile-upload">
                            <div class="profile-preview">
                                <img id="instructorProfilePreview" src="images/default-avatar.png" alt="Profile Preview">
                            </div>
                            <div class="upload-controls">
                                <label for="instructorProfile" class="upload-btn">
                                    <i class="fas fa-camera"></i> Upload Photo
                                </label>
                                <input type="file" id="instructorProfile" name="instructor_profile" accept="image/*" onchange="previewImage(this, 'instructorProfilePreview')" hidden>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Personal Information</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="instructor_id">Instructor ID</label>
                                <input type="text" id="instructor_id" name="instructor_id" placeholder="INS001" pattern="INS\d{3}" required>
                                <small>Format: INS followed by 3 digits</small>
                            </div>
                            <div class="form-group">
                                <label for="ins_fname">First Name</label>
                                <input type="text" id="ins_fname" name="ins_fname" required>
                            </div>
                            <div class="form-group">
                                <label for="ins_lname">Last Name</label>
                                <input type="text" id="ins_lname" name="ins_lname" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="ins_email">Email</label>
                                <input type="email" id="ins_email" name="ins_email" required>
                            </div>
                            <div class="form-group">
                                <label for="ins_phone">Phone Number</label>
                                <input type="tel" id="ins_phone" name="ins_phone" pattern="\d{3}-\d{4}-\d{3}" placeholder="3XX-XXXX-XXX" required>
                            </div>
                            <div class="form-group">
                                <label for="ins_cnic">CNIC</label>
                                <input type="text" id="ins_cnic" name="ins_cnic" pattern="\d{5}-\d{7}-\d{1}" placeholder="12345-1234567-1" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Professional Information</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ins_qualification">Qualification</label>
                                <input type="text" id="ins_qualification" name="ins_qualification" required>
                            </div>
                            <div class="form-group">
                                <label for="ins_specialization">Specialization</label>
                                <input type="text" id="ins_specialization" name="ins_specialization" required>
                            </div>
                            <div class="form-group">
                                <label for="ins_yoe">Years of Experience</label>
                                <input type="number" id="ins_yoe" name="ins_yoe" min="0" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Register Instructor
                        </button>
                        <button type="reset" class="btn-secondary">
                            <i class="fas fa-undo"></i> Reset Form
                        </button>
                        <button type="button" class="btn-secondary" onclick="closeInstructorForm()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/admin-dashboard.js"></script>
</body>
</html>
