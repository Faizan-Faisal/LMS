<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - LMS</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="management-section">
        <div class="section-header">
            <h2>Student Management</h2>
            <div class="header-actions">
                <button class="btn-primary" onclick="showStudentForm()">
                    <i class="fas fa-plus"></i> Add New Student
                </button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="studentSearch" placeholder="Search students...">
                </div>
                <button class="btn-secondary" onclick="refreshStudentTable()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Student Table -->
        <div class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Class</th>
                        <th>Section</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Student data will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Student Registration Form Modal -->
        <div id="studentFormContainer" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Register New Student</h3>
                    <span class="close" onclick="closeStudentForm()">&times;</span>
                </div>
                <form id="studentForm" enctype="multipart/form-data">
                    <div class="form-section">
                        <div class="profile-upload">
                            <div class="profile-preview">
                                <img id="studentProfilePreview" src="images/default-avatar.png" alt="Profile Preview">
                            </div>
                            <div class="upload-controls">
                                <label for="studentProfile" class="upload-btn">
                                    <i class="fas fa-camera"></i> Upload Photo
                                </label>
                                <input type="file" id="studentProfile" name="student_profile" accept="image/*" onchange="previewImage(this, 'studentProfilePreview')" hidden>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Personal Information</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="student_id">Student ID</label>
                                <input type="text" id="student_id" name="student_id" placeholder="STD001" pattern="STD\d{3}" required>
                                <small>Format: STD followed by 3 digits</small>
                            </div>
                            <div class="form-group">
                                <label for="std_fname">First Name</label>
                                <input type="text" id="std_fname" name="std_fname" required>
                            </div>
                            <div class="form-group">
                                <label for="std_lname">Last Name</label>
                                <input type="text" id="std_lname" name="std_lname" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="std_email">Email</label>
                                <input type="email" id="std_email" name="std_email" required>
                            </div>
                            <div class="form-group">
                                <label for="std_phone">Phone Number</label>
                                <input type="tel" id="std_phone" name="std_phone" pattern="\d{3}-\d{4}-\d{3}" placeholder="3XX-XXXX-XXX" required>
                            </div>
                            <div class="form-group">
                                <label for="std_cnic">CNIC</label>
                                <input type="text" id="std_cnic" name="std_cnic" pattern="\d{5}-\d{7}-\d{1}" placeholder="12345-1234567-1" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="std_dob">Date of Birth</label>
                                <input type="date" id="std_dob" name="std_dob" required>
                            </div>
                            <div class="form-group">
                                <label for="std_gender">Gender</label>
                                <select id="std_gender" name="std_gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h4>Academic Information</h4>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="std_class">Class</label>
                                <select id="std_class" name="std_class" required onchange="updateSectionOptions()">
                                    <option value="">Select Class</option>
                                    <option value="9">9th Class</option>
                                    <option value="10">10th Class</option>
                                    <option value="11">11th Class</option>
                                    <option value="12">12th Class</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="std_section">Section</label>
                                <select id="std_section" name="std_section" required>
                                    <option value="">Select Class First</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group full-width">
                                <label for="std_address">Address</label>
                                <textarea id="std_address" name="std_address" rows="3" required></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i class="fas fa-save"></i> Register Student
                        </button>
                        <button type="reset" class="btn-secondary">
                            <i class="fas fa-undo"></i> Reset Form
                        </button>
                        <button type="button" class="btn-secondary" onclick="closeStudentForm()">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/admin-dashboard.js"></script>
</body>
</html>
